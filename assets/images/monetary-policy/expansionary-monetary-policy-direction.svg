<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 656" role="img" aria-labelledby="title desc">
  <title id="title">Expansionary monetary policy direction</title>
  <desc id="desc">Expansionary monetary policy lowers rates or increases money supply, making credit cheaper and increasing demand.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0b2736"/>
      <stop offset="1" stop-color="#113f38"/>
    </linearGradient>
    <linearGradient id="green" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#86efac"/>
      <stop offset="1" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#67e8f9"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#000" flood-opacity=".28"/>
    </filter>
  </defs>
  <rect width="1280" height="656" rx="40" fill="url(#bg)"/>
  <circle cx="1010" cy="120" r="190" fill="#86efac" opacity=".09"/>
  <circle cx="180" cy="550" r="210" fill="#38bdf8" opacity=".07"/>

  <g transform="translate(72 68)">
    <text x="0" y="0" fill="#eaf2ff" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="850">Expansionary</text>
    <text x="0" y="54" fill="#b9c8dd" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="700">pushes total demand up</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="86" y="190" width="305" height="300" rx="34" fill="#122a3b" stroke="#67e8f9" stroke-opacity=".35"/>
    <circle cx="238" cy="305" r="72" fill="#102236" stroke="#67e8f9" stroke-width="8"/>
    <text x="238" y="325" text-anchor="middle" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="76" font-weight="900">%</text>
    <path d="M238 428 L238 350 L198 350 L238 292 L278 350 L238 350" transform="rotate(180 238 360)" fill="url(#green)"/>
    <text x="238" y="535" text-anchor="middle" fill="#eaf2ff" font-family="Inter, Arial, sans-serif" font-size="35" font-weight="850">Lower rates</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="487" y="190" width="305" height="300" rx="34" fill="#122a3b" stroke="#67e8f9" stroke-opacity=".35"/>
    <rect x="575" y="282" width="130" height="112" rx="18" fill="#eaf2ff" opacity=".95"/>
    <path d="M586 282 C594 220 686 220 695 282" fill="none" stroke="#eaf2ff" stroke-width="20" stroke-linecap="round"/>
    <path d="M562 250 h42 l36 -54 36 54 h42 l-78 118 Z" fill="url(#blue)" opacity=".95"/>
    <text x="640" y="535" text-anchor="middle" fill="#eaf2ff" font-family="Inter, Arial, sans-serif" font-size="35" font-weight="850">More spending</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="888" y="190" width="305" height="300" rx="34" fill="#123d35" stroke="#86efac" stroke-opacity=".45"/>
    <rect x="960" y="370" width="46" height="70" rx="10" fill="#86efac" opacity=".72"/>
    <rect x="1026" y="318" width="46" height="122" rx="10" fill="#86efac" opacity=".84"/>
    <rect x="1092" y="250" width="46" height="190" rx="10" fill="#86efac"/>
    <path d="M950 258 C1002 245 1042 212 1084 156" fill="none" stroke="#ffffff" stroke-width="14" stroke-linecap="round"/>
    <path d="M1084 156 l-2 58 50 -30 Z" fill="#ffffff"/>
    <text x="1040" y="535" text-anchor="middle" fill="#eaf2ff" font-family="Inter, Arial, sans-serif" font-size="35" font-weight="850">Demand rises</text>
  </g>

  <path d="M418 340 H462" stroke="#86efac" stroke-width="14" stroke-linecap="round"/>
  <path d="M455 340 l-24 -18 v36 Z" fill="#86efac"/>
  <path d="M819 340 H863" stroke="#86efac" stroke-width="14" stroke-linecap="round"/>
  <path d="M856 340 l-24 -18 v36 Z" fill="#86efac"/>
</svg>
