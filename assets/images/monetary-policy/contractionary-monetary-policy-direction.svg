<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 656" role="img" aria-labelledby="title desc">
  <title id="title">Contractionary monetary policy direction</title>
  <desc id="desc">Contractionary monetary policy raises rates or reduces money supply, making credit dearer and reducing inflationary pressure.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#101d2e"/>
      <stop offset="1" stop-color="#2a3042"/>
    </linearGradient>
    <linearGradient id="amber" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fde68a"/>
      <stop offset="1" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="blue" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7dd3fc"/>
      <stop offset="1" stop-color="#0ea5e9"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="16" flood-color="#000" flood-opacity=".3"/>
    </filter>
  </defs>
  <rect width="1280" height="656" rx="40" fill="url(#bg)"/>
  <circle cx="1030" cy="118" r="190" fill="#f59e0b" opacity=".08"/>
  <circle cx="184" cy="548" r="210" fill="#0ea5e9" opacity=".07"/>

  <g transform="translate(72 68)">
    <text x="0" y="0" fill="#eaf2ff" font-family="Inter, Arial, sans-serif" font-size="54" font-weight="850">Contractionary</text>
    <text x="0" y="54" fill="#b9c8dd" font-family="Inter, Arial, sans-serif" font-size="29" font-weight="700">cools total demand</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="86" y="190" width="305" height="300" rx="34" fill="#172638" stroke="#fde68a" stroke-opacity=".38"/>
    <circle cx="238" cy="305" r="72" fill="#102236" stroke="#fde68a" stroke-width="8"/>
    <text x="238" y="325" text-anchor="middle" fill="#ffffff" font-family="Inter, Arial, sans-serif" font-size="76" font-weight="900">%</text>
    <path d="M238 430 L238 352 L198 352 L238 294 L278 352 L238 352" fill="url(#amber)"/>
    <text x="238" y="535" text-anchor="middle" fill="#eaf2ff" font-family="Inter, Arial, sans-serif" font-size="35" font-weight="850">Higher rates</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="487" y="190" width="305" height="300" rx="34" fill="#172638" stroke="#fde68a" stroke-opacity=".38"/>
    <rect x="575" y="282" width="130" height="112" rx="18" fill="#eaf2ff" opacity=".95"/>
    <path d="M586 282 C594 220 686 220 695 282" fill="none" stroke="#eaf2ff" stroke-width="20" stroke-linecap="round"/>
    <path d="M562 214 h42 l36 54 36 -54 h42 l-78 134 Z" fill="url(#blue)" opacity=".95"/>
    <text x="640" y="535" text-anchor="middle" fill="#eaf2ff" font-family="Inter, Arial, sans-serif" font-size="35" font-weight="850">Less spending</text>
  </g>

  <g filter="url(#shadow)">
    <rect x="888" y="190" width="305" height="300" rx="34" fill="#2b2636" stroke="#fde68a" stroke-opacity=".45"/>
    <path d="M1040 232 C1098 302 1134 344 1118 394 C1105 436 1068 458 1034 458 C986 458 948 428 948 384 C948 342 988 312 1006 260 C1014 286 1028 309 1047 329 C1059 295 1054 263 1040 232 Z" fill="#fb7185"/>
    <path d="M1120 236 V390" fill="none" stroke="#7dd3fc" stroke-width="16" stroke-linecap="round"/>
    <path d="M1120 448 l-42 -64 h84 Z" fill="#7dd3fc"/>
    <text x="1040" y="535" text-anchor="middle" fill="#eaf2ff" font-family="Inter, Arial, sans-serif" font-size="35" font-weight="850">Inflation falls</text>
  </g>

  <path d="M418 340 H462" stroke="#fde68a" stroke-width="14" stroke-linecap="round"/>
  <path d="M455 340 l-24 -18 v36 Z" fill="#fde68a"/>
  <path d="M819 340 H863" stroke="#fde68a" stroke-width="14" stroke-linecap="round"/>
  <path d="M856 340 l-24 -18 v36 Z" fill="#fde68a"/>
</svg>
